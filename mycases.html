<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的案例 - George Design</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <header class="header">
    <h1 class="header-title" id="headerTitle">我的案例</h1>
    <div class="header-actions">
      <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
      <button class="btn btn-ghost" onclick="toggleHistory()">📜</button>
      <button class="btn btn-ghost" onclick="showShortcuts()">⌨</button>
    </div>
  </header>

  <div class="page-content">
    <div class="page active">
      <div id="myRoot"></div>
    </div>
  </div>
</main>

<!-- 新建/编辑项目 -->
<div class="modal-overlay" id="projModal">
  <div class="modal modal-lg">
    <div class="modal-header"><h2 id="projModalTitle">新建项目</h2><button class="modal-close" onclick="closeModal('projModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>项目名称</label><input type="text" id="pName" placeholder="如 江景豪宅全案"></div>
        <div class="form-group"><label>风格</label><select id="pStyle"><option>现代简约</option><option>北欧</option><option>新中式</option><option>轻奢</option><option>工业风</option><option>日式</option><option>美式</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>面积 (㎡)</label><input type="number" id="pArea" placeholder="如 180" min="10" max="2000"></div>
        <div class="form-group"><label>预算 (万)</label><input type="number" id="pBudget" placeholder="如 60" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1;"><label>国家/地区</label><select id="pCountry"><option>美国</option><option>新加坡</option><option>马来西亚</option><option>欧美</option><option>非洲</option><option>日本</option></select></div>
        <div class="form-group" style="flex:1;"><label>是否含 VR 全景</label><select id="pVR"><option value="no">效果图</option><option value="yes">VR全景</option></select></div>
        <div class="form-group" style="flex:1;"><label>复用积分价（每空间）🪙</label><input type="number" id="pPoints" placeholder="如 150" min="0" value="150"></div>
      </div>
      <div class="form-group"><label>包含空间（可多选）</label>
        <div id="spacePick" class="space-pick"></div>
      </div>
      <div class="form-group"><label>设计软件（单选，本案例由该软件设计制作）</label>
        <div id="swPick" class="space-pick"></div>
      </div>
      <div class="form-group" style="font-size:12px;color:var(--text-muted);">提示：每个空间内含产品清单 / 3D模型 / CAD图纸（演示自动生成）。VR全景或效果图二选一作为交付方案。</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('projModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProject()">保存</button>
    </div>
  </div>
</div>

<div class="history-panel" id="historyPanel"><div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><strong>操作历史</strong><button class="btn btn-ghost btn-sm" onclick="toggleHistory()">✕</button></div><div id="historyList"></div></div>
<div class="modal-overlay" id="shortcutsModal"><div class="modal" style="max-width:600px;"><div class="modal-header"><h2>快捷键参考</h2><button class="modal-close" onclick="closeModal('shortcutsModal')">✕</button></div><div class="modal-body"><table><thead><tr><th>快捷键</th><th>功能</th></tr></thead><tbody><tr><td><kbd>?</kbd></td><td>显示快捷键</td></tr><tr><td><kbd>Esc</kbd></td><td>返回 / 关闭弹窗</td></tr></tbody></table></div></div></div>
<div class="compare-panel hidden" id="comparePanel"><div class="compare-header"><span>对比清单 (<span id="compareCount">0</span>)</span><button onclick="clearCompare()">清空</button></div><div class="compare-items" id="compareItems"></div></div>
<div class="modal-overlay" id="compareModal"><div class="modal modal-lg"><div class="modal-header"><h2>空间对比</h2><button class="modal-close" onclick="closeModal('compareModal')">✕</button></div><div class="modal-body" id="compareModalBody"></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="common.js"></script>
<script src="gdpoints.js"></script>
<script src="gdcase.js"></script>
<script src="gdproject.js"></script>
<script>
var SPACE_OPTS = ['客厅','餐厅','主卧','卧室','厨房','书房','卫生间','阳台','儿童房','茶室','玄关','衣帽间'];
var THEME_BY_STYLE = {'现代简约':'modern','北欧':'nordic','新中式':'chinese','轻奢':'luxury','工业风':'industrial','日式':'japanese','美式':'american'};
var ME = (window.GDRole ? GDRole.me() : '陈磊');
var MEID = (ME==='陈磊'?'001':'0'+(['林悦','王明远','张薇','李强','孙敏','周杰'].indexOf(ME)+2).toString().padStart(2,'0'));

// 我的项目：每个设计师有自己的种子；只显示属于当前身份的项目
function loadMine(){
  var seedByUser = {
    '陈磊': [
      {id:1,name:'我的滨海别墅复盘',designer:'陈磊',designerId:'001',style:'现代简约',country:'美国',area:300,budget:110,reuseCount:18,time:'2026-05-19',theme:'modern',seq:25,delivery:'vr',software:'max',hasVR:true,spaces:['客厅','主卧','厨房','餐厅']},
      {id:2,name:'新中式自宅方案',designer:'陈磊',designerId:'001',style:'新中式',country:'马来西亚',area:130,budget:36,reuseCount:9,time:'2026-05-11',theme:'chinese',seq:9,delivery:'effect',software:'su',hasVR:false,spaces:['客厅','书房','主卧']},
    ],
    '林悦': [
      {id:11,name:'北欧两居改造',designer:'林悦',designerId:'002',style:'北欧',country:'欧美',area:96,budget:28,reuseCount:22,time:'2026-05-18',theme:'nordic',seq:25,delivery:'effect',software:'su',hasVR:false,spaces:['客厅','卧室','厨房']},
    ],
    '王明远': [
      {id:21,name:'日式禅意小宅',designer:'王明远',designerId:'003',style:'日式',country:'日本',area:80,budget:24,reuseCount:12,time:'2026-05-14',theme:'japanese',seq:13,delivery:'effect',software:'swj',hasVR:false,spaces:['客厅','茶室','卧室']},
    ]
  };
  var seed = (seedByUser[ME] || []).slice();
  seed.forEach(function(p){ p.number = gdCaseNumber(p.designerId, p.country, p.seq); });
  try{ var v=JSON.parse(localStorage.getItem('gd-my-projects')); if(v&&v.length){
    // 只取属于当前身份的持久化项目
    v.filter(function(p){ return (p.designer||'陈磊')===ME; }).forEach(function(p){
      if(!seed.some(function(s){return s.id===p.id;})) seed.unshift(p);
      else { var i=seed.findIndex(function(s){return s.id===p.id;}); seed[i]=p; }
    });
  }}catch(e){}
  return seed;
}
var MY = loadMine();
var nextPid = MY.reduce(function(m,p){return Math.max(m,p.id);}, Date.now()%100000)+1;
// 保存时合并回全量（保留其他人的项目）
function saveMine(){
  var all=[]; try{ all=JSON.parse(localStorage.getItem('gd-my-projects'))||[]; }catch(e){}
  var others = all.filter(function(p){ return (p.designer||'陈磊')!==ME; });
  localStorage.setItem('gd-my-projects', JSON.stringify(others.concat(MY)));
}

GDProject.mount({
  rootEl: 'myRoot',
  getProjects: function(){ return MY; },
  title: '我的案例',
  rootLabel: '我的项目',
  createLabel: '新建项目',
  editable: true,
  filters: ['search','style','space','country','budget','software','sort'],
  emptyText: '还没有项目，点「新建项目」开始',
  onTitle: function(t){ document.getElementById('headerTitle').textContent = t; },
  onCreate: function(){ openProjForm(null); },
  onEdit: function(id){ openProjForm(id); },
  onDelete: function(id){ delProject(id); }
});

// ---- 新建/编辑 表单 ----
var editingPid = null;
function renderSpacePick(selected){
  selected = selected || [];
  document.getElementById('spacePick').innerHTML = SPACE_OPTS.map(function(sp){
    var on = selected.indexOf(sp)>=0;
    return '<label class="space-pick-item'+(on?' on':'')+'"><input type="checkbox" value="'+sp+'" '+(on?'checked':'')+' onchange="this.parentNode.classList.toggle(\'on\',this.checked)"> '+sp+'</label>';
  }).join('');
}
var SW_OPTS = [['max','3DMax'],['kjl','酷家乐'],['swj','三维家'],['su','SketchUp草图大师'],['cad','AutoCAD']];
function renderSwPick(selected){
  selected = selected || 'max';
  if(Array.isArray(selected)) selected = selected[0] || 'max';
  document.getElementById('swPick').innerHTML = SW_OPTS.map(function(s){
    var on = selected===s[0];
    return '<label class="space-pick-item'+(on?' on':'')+'"><input type="radio" name="swPickRadio" value="'+s[0]+'" '+(on?'checked':'')+' onchange="document.querySelectorAll(\'#swPick .space-pick-item\').forEach(function(e){e.classList.remove(\'on\')});this.parentNode.classList.add(\'on\')"> '+s[1]+'</label>';
  }).join('');
}
function openProjForm(id){
  editingPid = id;
  if(id){
    var p = MY.find(function(x){return x.id===id;}); if(!p) return;
    document.getElementById('projModalTitle').textContent='编辑项目';
    document.getElementById('pName').value=p.name;
    document.getElementById('pStyle').value=p.style;
    document.getElementById('pArea').value=p.area;
    document.getElementById('pBudget').value=p.budget;
    document.getElementById('pCountry').value=p.country;
    document.getElementById('pVR').value=p.hasVR?'yes':'no';
    document.getElementById('pPoints').value = (p.casePoints!=null?p.casePoints:150);
    renderSpacePick(p.spaces);
    renderSwPick(p.software||'max');
  } else {
    document.getElementById('projModalTitle').textContent='新建项目';
    document.getElementById('pName').value='';
    document.getElementById('pArea').value='';
    document.getElementById('pBudget').value='';
    document.getElementById('pStyle').value='现代简约';
    document.getElementById('pCountry').value='美国';
    document.getElementById('pVR').value='no';
    document.getElementById('pPoints').value=150;
    renderSpacePick(['客厅','主卧']);
    renderSwPick('max');
  }
  openModal('projModal');
}
function saveProject(){
  var name=document.getElementById('pName').value.trim();
  if(!name){ showToast('warning','请输入项目名称'); return; }
  var spaces = Array.prototype.slice.call(document.querySelectorAll('#spacePick input:checked')).map(function(i){return i.value;});
  if(!spaces.length){ showToast('warning','请至少选择一个空间'); return; }
  var swEl = document.querySelector('#swPick input:checked');
  var software = swEl ? swEl.value : 'max';
  var style=document.getElementById('pStyle').value;
  var pts=parseInt(document.getElementById('pPoints').value); if(isNaN(pts)||pts<0) pts=0;
  var hasVR=document.getElementById('pVR').value==='yes';
  var data={
    name:name, style:style, theme:THEME_BY_STYLE[style]||'modern',
    area:parseInt(document.getElementById('pArea').value)||100,
    budget:parseInt(document.getElementById('pBudget').value)||20,
    country:document.getElementById('pCountry').value,
    hasVR:hasVR, delivery:hasVR?'vr':'effect', software:software,
    casePoints:pts,
    spaces:spaces
  };
  var theProj;
  if(editingPid){
    var p=MY.find(function(x){return x.id===editingPid;});
    Object.assign(p,data); theProj=p;
    showToast('success','项目「'+name+'」已更新');
  } else {
    var seq = (MY.filter(function(x){return x.country===data.country;}).length)+1;
    theProj=Object.assign({id:nextPid, designer:ME, designerId:MEID, reuseCount:0, time:gdToday(), number:gdCaseNumber(MEID, data.country, seq)}, data);
    MY.unshift(theProj);
    nextPid++;
    showToast('success','项目「'+name+'」已创建，积分价待审核');
  }
  // 为该项目每个空间登记积分价（新建/改价 → 待审核，需组长在仪表盘审核通过后才计分）
  if(window.GDPoints){
    theProj.spaces.forEach(function(sp,i){
      var sid=theProj.id*100+i;
      GDPoints.setCasePoints(sid, pts, ME, '待审核');
    });
  }
  saveMine();
  closeModal('projModal');
  var inst=GDProject.get('myRoot');
  if(inst.currentProj && editingPid){ inst.renderSpaces(editingPid); } else { inst.showProjects(); }
  editingPid=null;
}
function delProject(id){
  var p=MY.find(function(x){return x.id===id;}); if(!p) return;
  if(!confirm('确定删除项目「'+p.name+'」？其下所有空间也会删除。')) return;
  MY=MY.filter(function(x){return x.id!==id;});
  saveMine();
  var inst=GDProject.get('myRoot'); inst.showProjects();
  showToast('error','项目「'+p.name+'」已删除');
}
window.openProjForm=openProjForm; window.saveProject=saveProject; window.delProject=delProject;
</script>
</body>
</html>
