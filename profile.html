<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 数字分身</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --bg-hover: #e9ecef;
            --text: #212529;
            --text-secondary: #6c757d;
            --primary: #0d6efd;
            --radius: 12px;
            --radius-sm: 8px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }
        
        .avatar-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,.05);
        }
        
        .avatar-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }
        
        .avatar-info h2 {
            font-size: 22px;
            margin-bottom: 4px;
        }
        
        .avatar-info .status {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .progress-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 25%;
            transition: width .3s ease;
        }
        
        .progress-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .step-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.05);
        }
        
        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }
        
        .step-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .step-content {
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dee2e6;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: border-color .2s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #0b5ed7;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5c636a;
        }
        
        .btn-save {
            background: #28a745;
            color: white;
        }
        
        .btn-save:hover {
            background: #218838;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 14px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all .3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.success {
            background: #28a745;
        }
        
        .toast.error {
            background: #dc3545;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 步骤Tab导航 */
        .step-tabs { display:flex; gap:8px; margin-bottom:20px; background:var(--bg); padding:6px; border-radius:var(--radius); }
        .step-tab { flex:1; padding:10px 12px; text-align:center; cursor:pointer; border-radius:var(--radius-sm); font-size:13px; font-weight:500; color:var(--text-secondary); transition:all .2s; display:flex; align-items:center; justify-content:center; gap:6px; }
        .step-tab:hover { color:var(--text); background:var(--bg-hover); }
        .step-tab.active { background:var(--primary); color:#fff; }
        .step-tab .step-num { width:20px; height:20px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
        .step-tab.active .step-num { background:rgba(255,255,255,.25); }
        .step-panel { display:none; animation:fadeIn .3s ease; }
        .step-panel.active { display:block; }
        .step-nav-btns { display:flex; justify-content:space-between; margin-top:16px; }

        @media(max-width:768px) {
          .step-tabs { flex-wrap:wrap; }
          .step-tab { flex:1 1 40%; padding:8px; font-size:12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>个人中心</h1>
            <div class="subtitle">创建和管理您的数字分身</div>
        </div>
        
        <div class="avatar-card">
            <div class="avatar-header">
                <img src="https://via.placeholder.com/80" alt="头像" class="avatar-img">
                <div class="avatar-info">
                    <h2>我的数字分身</h2>
                    <div class="status">未完成配置</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">完成度: 25% (1/4)</div>
        </div>
        
        <!-- 步骤Tab导航 -->
        <div class="step-tabs">
          <div class="step-tab active" onclick="switchStepTab(1)">
            <span class="step-num">1</span> 基础信息
          </div>
          <div class="step-tab" onclick="switchStepTab(2)">
            <span class="step-num">2</span> 风格样本
          </div>
          <div class="step-tab" onclick="switchStepTab(3)">
            <span class="step-num">3</span> 行为数据授权
          </div>
          <div class="step-tab" onclick="switchStepTab(4)">
            <span class="step-num">4</span> 训练控制
          </div>
        </div>
        
        <!-- 步骤1: 基础信息 -->
        <div class="step-panel active" id="step-panel-1">
            <div class="step-header">
                <div class="step-num">1</div>
                <div class="step-title">基础信息</div>
            </div>
            <div class="step-content">
                <div class="form-group">
                    <label class="form-label">分身名称</label>
                    <input type="text" class="form-control" id="avatarName" placeholder="请输入分身名称">
                </div>
                <div class="form-group">
                    <label class="form-label">性别</label>
                    <select class="form-control" id="avatarGender">
                        <option value="">请选择</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">年龄</label>
                    <input type="number" class="form-control" id="avatarAge" placeholder="请输入年龄" min="1" max="120">
                </div>
            </div>
            <div class="step-nav-btns">
              <button class="btn btn-primary" onclick="switchStepTab(2)">下一步 →</button>
            </div>
        </div>
        
        <!-- 步骤2: 风格样本 -->
        <div class="step-panel" id="step-panel-2">
            <div class="step-header">
                <div class="step-num">2</div>
                <div class="step-title">风格样本</div>
            </div>
            <div class="step-content">
                <div class="form-group">
                    <label class="form-label">语言风格</label>
                    <select class="form-control" id="avatarLanguage">
                        <option value="">请选择</option>
                        <option value="formal">正式</option>
                        <option value="casual">随意</option>
                        <option value="professional">专业</option>
                        <option value="friendly">友好</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">常用表达</label>
                    <textarea class="form-control" id="avatarExpressions" placeholder="请输入您的常用表达或口头禅" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">上传风格样本</label>
                    <input type="file" class="form-control" id="avatarSamples" multiple>
                    <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">支持上传文本、音频、视频文件</div>
                </div>
            </div>
            <div class="step-nav-btns">
              <button class="btn btn-secondary" onclick="switchStepTab(1)">← 上一步</button>
              <button class="btn btn-primary" onclick="switchStepTab(3)">下一步 →</button>
            </div>
        </div>
        
        <!-- 步骤3: 行为数据授权 -->
        <div class="step-panel" id="step-panel-3">
            <div class="step-header">
                <div class="step-num">3</div>
                <div class="step-title">行为数据授权</div>
            </div>
            <div class="step-content">
                <div class="form-group">
                    <div style="margin-bottom: 12px;">
                        <input type="checkbox" id="authChat" checked>
                        <label for="authChat">聊天记录</label>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <input type="checkbox" id="authSearch">
                        <label for="authSearch">搜索历史</label>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <input type="checkbox" id="authApp">
                        <label for="authApp">应用使用数据</label>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <input type="checkbox" id="authLocation">
                        <label for="authLocation">位置信息</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">授权期限</label>
                    <select class="form-control" id="authDuration">
                        <option value="30">30天</option>
                        <option value="90">90天</option>
                        <option value="180">180天</option>
                        <option value="365">1年</option>
                        <option value="0">永久</option>
                    </select>
                </div>
            </div>
            <div class="step-nav-btns">
              <button class="btn btn-secondary" onclick="switchStepTab(2)">← 上一步</button>
              <button class="btn btn-primary" onclick="switchStepTab(4)">下一步 →</button>
            </div>
        </div>
        
        <!-- 步骤4: 训练控制 -->
        <div class="step-panel" id="step-panel-4">
            <div class="step-header">
                <div class="step-num">4</div>
                <div class="step-title">训练控制</div>
            </div>
            <div class="step-content">
                <div class="form-group">
                    <label class="form-label">训练强度</label>
                    <select class="form-control" id="trainIntensity">
                        <option value="low">低强度</option>
                        <option value="medium" selected>中等强度</option>
                        <option value="high">高强度</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">训练周期</label>
                    <input type="number" class="form-control" id="trainDays" value="7" min="1" max="30">
                    <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">训练天数 (1-30天)</div>
                </div>
                <div class="form-group">
                    <label class="form-label">自动更新</label>
                    <select class="form-control" id="autoUpdate">
                        <option value="daily">每日</option>
                        <option value="weekly" selected>每周</option>
                        <option value="monthly">每月</option>
                        <option value="manual">手动</option>
                    </select>
                </div>
            </div>
            <div class="step-nav-btns">
              <button class="btn btn-secondary" onclick="switchStepTab(3)">← 上一步</button>
            </div>
        </div>
        
        <!-- 分身能力预览 -->
        <div class="step-card">
            <div class="step-header">
                <div class="step-num">!</div>
                <div class="step-title">分身能力预览</div>
            </div>
            <div class="step-content">
                <p style="color: var(--text-secondary); margin-bottom: 16px;">完成配置后，您的数字分身将具备以下能力：</p>
                <ul style="padding-left: 20px; color: var(--text-secondary);">
                    <li>智能对话与个性化回复</li>
                    <li>学习您的语言风格和表达习惯</li>
                    <li>根据您的行为数据提供个性化建议</li>
                    <li>持续优化和更新能力</li>
                </ul>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 步骤Tab切换
        function switchStepTab(step) {
          document.querySelectorAll('.step-tab').forEach(el => el.classList.remove('active'));
          document.querySelectorAll('.step-panel').forEach(el => el.classList.remove('active'));
          
          document.querySelectorAll('.step-tab')[step-1].classList.add('active');
          document.getElementById(`step-panel-${step}`).classList.add('active');
        }
        
        // 更新进度条
        function updateProgress() {
            let completed = 0;
            for (let i = 1; i <= 4; i++) {
                if (localStorage.getItem(`avatar_step_${i}`) === 'done') {
                    completed++;
                }
            }
            
            const progress = (completed / 4) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `完成度: ${progress}% (${completed}/4)`;
        }
        
        // 保存步骤
        function saveStep(step) {
            localStorage.setItem(`avatar_step_${step}`, 'done');
            showToast('success', `步骤 ${step} 已保存`);
            updateProgress();
            if (step < 4) switchStepTab(step + 1);
        }
        
        // 显示Toast提示
        function showToast(type, message) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateProgress();
        });
    </script>
</body>
</html>
