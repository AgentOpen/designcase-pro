<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAS文件管理 - George Design</title>
<link rel="stylesheet" href="common.css">
<style>
.nas-layout { display:flex; gap:20px; flex-wrap:nowrap; height:calc(100vh - 180px); }
.nas-left { width:300px; min-width:300px; display:flex; flex-direction:column; gap:16px; position:sticky; top:0; height:100%; }
.nas-right { flex:1; min-width:400px; overflow-y:auto; padding-right:8px; }
.nas-filter-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); padding:20px; flex-shrink:0; }
.nas-filter-card .card-title { margin-bottom:16px; font-size:15px; font-weight:600; }
.nas-filter-row { display:flex; flex-direction:column; gap:12px; }
.nas-filter-row select, .nas-filter-row input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; background:var(--card-bg); color:var(--text); }
.nas-filter-row select:focus, .nas-filter-row input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,.1); }
.nas-filter-btns { display:flex; gap:10px; margin-top:8px; }
.nas-tree-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.nas-tree-header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:14px; font-weight:600; background:var(--bg); }
.nas-tree-header .arrow { font-size:11px; transition:transform .2s; }
.nas-tree-header.collapsed .arrow { transform:rotate(-90deg); }
.nas-tree-body { padding:12px; font-size:13px; overflow-y:auto; flex:1; }
.nas-tree-body.hidden { display:none; }
.nas-tree-body .dir-item { padding:6px 10px; cursor:pointer; border-radius:var(--radius-sm); display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:2px; }
.nas-tree-body .dir-item:hover { background:var(--bg); }
.nas-tree-body .dir-item.active { background:var(--primary-light); color:var(--primary); font-weight:500; }
.nas-tree-body .dir-children { padding-left:24px; margin-top:2px; }
.nas-tree-body .dir-toggle { width:16px; display:inline-block; text-align:center; cursor:pointer; font-size:10px; }
.case-card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.nas-case-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; transition:all var(--transition); }
.nas-case-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.nas-case-card .card-thumb { height:180px; }
.nas-case-card .card-body { padding:18px; }
.nas-case-card .card-body-title { font-size:15px; font-weight:600; margin-bottom:8px; }
.nas-case-card .card-body-info { font-size:12px; color:var(--text-secondary); margin-bottom:8px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.nas-case-card .card-body-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.nas-case-card .card-body-footer { display:flex; gap:10px; padding-top:12px; border-top:1px solid var(--border); }
.result-count { font-size:13px; color:var(--text-secondary); margin-bottom:16px; padding:8px 0; border-bottom:1px solid var(--border); }
/* Pagination */
.nas-pagination { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:20px; padding:16px 0; border-top:1px solid var(--border); }
.nas-pagination button { width:36px; height:36px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--card-bg); color:var(--text); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all var(--transition); }
.nas-pagination button:hover { border-color:var(--primary); color:var(--primary); }
.nas-pagination button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.nas-pagination button:disabled { opacity:.4; cursor:default; }
.nas-pagination .page-info { font-size:12px; color:var(--text-muted); padding:0 8px; }
/* PPT Proposal */
.ppt-proposal-layout { display:flex; height:calc(85vh - 120px); }
.ppt-sidebar { width:200px; min-width:200px; border-right:1px solid var(--border); overflow-y:auto; background:var(--bg); padding:8px 0; }
.ppt-sidebar .ppt-chapter { padding:10px 16px; cursor:pointer; font-size:13px; border-left:3px solid transparent; transition:all var(--transition); display:flex; align-items:center; gap:8px; }
.ppt-sidebar .ppt-chapter:hover { background:var(--card-bg); }
.ppt-sidebar .ppt-chapter.active { background:var(--card-bg); border-left-color:var(--primary); color:var(--primary); font-weight:600; }
.ppt-sidebar .ppt-subchapter { padding:7px 16px 7px 36px; cursor:pointer; font-size:12px; color:var(--text-secondary); transition:all var(--transition); }
.ppt-sidebar .ppt-subchapter:hover { color:var(--primary); background:var(--card-bg); }
.ppt-sidebar .ppt-subchapter.active { color:var(--primary); background:var(--card-bg); font-weight:500; }
.ppt-main { flex:1; display:flex; flex-direction:column; }
.ppt-canvas { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--bg); }
.ppt-slide-placeholder { text-align:center; color:var(--text-muted); }
.ppt-slide-icon { font-size:48px; margin-bottom:12px; }
.ppt-slide-label { font-size:14px; }
.ppt-slide-image { max-width:100%; max-height:100%; border-radius:var(--radius); box-shadow:var(--shadow-md); }
.ppt-slide-caption { text-align:center; font-size:13px; color:var(--text-secondary); margin-top:10px; }
.ppt-nav { display:flex; align-items:center; justify-content:center; gap:16px; padding:12px; border-top:1px solid var(--border); background:var(--card-bg); }
.ppt-slide-info { font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <header class="header">
    <h1 class="header-title">NAS文件管理</h1>
    <div class="header-actions">
      <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
      <button class="btn btn-ghost" onclick="toggleHistory()">📜</button>
      <button class="btn btn-ghost" onclick="showShortcuts()">⌨</button>
    </div>
  </header>

  <div class="page-content">
    <div class="page active" id="page-nas">
      <div class="nas-layout">
        <!-- Left Panel -->
        <div class="nas-left">
          <!-- Filter card -->
          <div class="nas-filter-card">
            <div class="card-title">🔍 快速筛选</div>
            <div class="nas-filter-row">
              <select id="nasDeptFilter" onchange="onDeptChange()">
                <option value="">全部部门</option>
                <option>设计一部</option><option>设计二部</option><option>设计三部</option>
                <option>设计四部</option><option>设计五部</option>
              </select>
              <select id="nasDesignerFilter" onchange="filterCases()">
                <option value="">全部设计师</option>
              </select>
              <select id="nasCountryFilter" onchange="filterCases()">
                <option value="">全部国家</option>
                <option>美国</option><option>欧美</option><option>新加坡</option>
                <option>马来西亚</option><option>日本</option><option>非洲</option>
              </select>
              <div class="nas-filter-btns">
                <button class="btn btn-primary btn-sm" onclick="filterCases()">搜索</button>
                <button class="btn btn-secondary btn-sm" onclick="resetNASFilter()">重置</button>
              </div>
            </div>
          </div>

          <!-- Directory tree card -->
          <div class="nas-tree-card">
            <div class="nas-tree-header" id="nasTreeHeader" onclick="toggleNASTree()">
              📂 NAS目录结构 <span class="arrow">▼</span>
            </div>
            <div class="nas-tree-body" id="nasTreeBody"></div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="nas-right">
          <div class="result-count" id="nasResultCount"></div>
          <div class="case-card-grid" id="nasCaseGrid"></div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="nas-pagination" id="nasPagination"></div>
    </div>
  </div>
</main>

<!-- NAS Download Confirmation Modal -->
<div class="modal-overlay" id="nasDownloadConfirmModal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header"><h2>确认复制到我的NAS</h2><button class="modal-close" onclick="closeModal('nasDownloadConfirmModal')">✕</button></div>
    <div class="modal-body">
      <p style="font-size:14px;" id="nasConfirmMsg"></p>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-primary" id="nasConfirmBtn" onclick="startNASDownload()">确认复制</button>
        <button class="btn btn-secondary" onclick="closeModal('nasDownloadConfirmModal')">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- NAS Download Progress Modal -->
<div class="modal-overlay" id="nasDownloadModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header"><h2>复制到我的NAS</h2><button class="modal-close" onclick="closeModal('nasDownloadModal')">✕</button></div>
    <div class="modal-body" style="text-align:center;">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;" id="nasDownloadStatus">正在创建副本目录...</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="nasDownloadBar" style="width:0%"></div></div>
      <div style="font-size:12px;margin-top:6px;" id="nasDownloadPercent">0%</div>
      <div style="margin-top:12px;display:flex;justify-content:center;gap:16px;">
        <div class="reuse-step" id="ns1"><div class="reuse-step-icon">📋</div><div class="reuse-step-text">创建副本目录</div></div>
        <div class="reuse-step" id="ns2"><div class="reuse-step-icon">📁</div><div class="reuse-step-text">拷贝文件</div></div>
        <div class="reuse-step" id="ns3"><div class="reuse-step-icon">✅</div><div class="reuse-step-text">完成</div></div>
      </div>
    </div>
  </div>
</div>

<!-- VR Panorama Modal -->
<div class="modal-overlay" id="vrPanoramaModal">
  <div class="modal" style="max-width:1100px;width:95vw;height:85vh;">
    <div class="modal-header"><h2 id="vrPanoramaTitle">VR 全景</h2><button class="modal-close" onclick="closeVRPanorama()">✕</button></div>
    <div class="modal-body" style="padding:0;height:calc(100% - 60px);">
      <iframe id="vrPanoramaFrame" style="width:100%;height:100%;border:none;" allow="fullscreen"></iframe>
    </div>
  </div>
</div>

<!-- PPT Proposal Modal -->
<div class="modal-overlay" id="pptProposalModal">
  <div class="modal" style="max-width:1000px;width:90vw;max-height:85vh;">
    <div class="modal-header"><h2 id="pptProposalTitle">PPT 设计提案</h2><button class="modal-close" onclick="closeModal('pptProposalModal')">✕</button></div>
    <div class="modal-body" style="padding:0;">
      <div class="ppt-proposal-layout">
        <div class="ppt-sidebar" id="pptSidebar"></div>
        <div class="ppt-main">
          <div class="ppt-canvas" id="pptCanvas">
            <div class="ppt-slide-placeholder">
              <div class="ppt-slide-icon">📊</div>
              <div class="ppt-slide-label">选择左侧章节查看设计提案</div>
            </div>
          </div>
          <div class="ppt-nav">
            <button class="btn btn-ghost btn-sm" onclick="pptPrevSlide()">◀ 上一页</button>
            <span class="ppt-slide-info" id="pptSlideInfo"></span>
            <button class="btn btn-ghost btn-sm" onclick="pptNextSlide()">下一页 ▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="history-panel" id="historyPanel"><div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><strong>操作历史</strong><button class="btn btn-ghost btn-sm" onclick="toggleHistory()">✕</button></div><div id="historyList"></div></div>
<div class="modal-overlay" id="shortcutsModal"><div class="modal" style="max-width:600px;"><div class="modal-header"><h2>快捷键参考</h2><button class="modal-close" onclick="closeModal('shortcutsModal')">✕</button></div><div class="modal-body"><table><thead><tr><th>快捷键</th><th>功能</th></tr></thead><tbody><tr><td><kbd>?</kbd></td><td>显示快捷键</td></tr><tr><td><kbd>Ctrl/Cmd + N</kbd></td><td>NAS文件管理</td></tr><tr><td><kbd>Esc</kbd></td><td>关闭弹窗</td></tr></tbody></table></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="common.js"></script>
<script src="gdcase.js"></script>
<script>
// ========== NAS DATA ==========
const nasData = {
  '设计一部': { designers: {
    '陈磊': { id:'001', countries: { '美国':['001-America-案例001','001-America-案例008'], '新加坡':['001-Singapore-案例002'], '马来西亚':['001-Malaysia-案例003','001-Malaysia-案例017','001-Malaysia-案例022'], '欧美':['001-Europe-案例015'] }},
    '林悦': { id:'002', countries: { '欧美':['002-Europe-案例004','002-Europe-案例021'], '新加坡':['002-Singapore-案例009'], '日本':['002-Japan-案例016'] }}
  }},
  '设计二部': { designers: {
    '王明远': { id:'003', countries: { '日本':['003-Japan-案例006'], '美国':['003-America-案例007'], '欧美':['003-Europe-案例011'], '非洲':['003-Africa-案例020'] }}
  }},
  '设计三部': { designers: {
    '张薇': { id:'004', countries: { '马来西亚':['004-Malaysia-案例010'], '非洲':['004-Africa-案例012'], '欧美':['004-Europe-案例018'] }}
  }},
  '设计四部': { designers: {
    '李强': { id:'005', countries: { '美国':['005-America-案例013'], '新加坡':['005-Singapore-案例014','005-Singapore-案例019'] }}
  }},
  '设计五部': { designers: {
    '赵工': { id:'006', countries: { '非洲':['006-Africa-案例030'] }},
    '孙敏': { id:'007', countries: { '马来西亚':['007-Malaysia-案例031'] }}
  }}
};

// Build flat case list from nasData
const nasCases = [];
const themeMap = { '现代简约':'modern','北欧':'nordic','新中式':'chinese','轻奢':'luxury','工业风':'industrial','日式':'japanese','美式':'american' };
const styleMap = {
  '陈磊':['现代简约','北欧','新中式'], '林悦':['轻奢','工业风','日式'],
  '王明远':['美式','现代简约','日式'], '张薇':['新中式','轻奢'],
  '李强':['工业风','美式','轻奢'], '赵工':['美式'], '孙敏':['北欧']
};

// VR panorama data - cases that have VR tours
const vrPanoramaMap = {
  '001-America-案例001': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '002-Europe-案例004': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '003-Japan-案例006': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '004-Malaysia-案例010': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '005-America-案例013': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '001-Singapore-案例002': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '003-Europe-案例011': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
  '005-Singapore-案例014': 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html',
};

// PPT proposal data - based on the PDF analysis
const pptProposalData = {
  title: 'American Villa Design',
  chapters: [
    { name: '封面', pages: 1, icon: '🏠' },
    { name: '过渡页', pages: 1, icon: '🖼️' },
    { name: 'FLOOR PLAN 平面图', pages: 2, icon: '📐' },
    { name: 'LIVING 客厅', pages: 5, icon: '🛋️' },
    { name: 'DINING 餐厅', pages: 5, icon: '🍽️' },
    { name: 'FOYER 门厅', pages: 3, icon: '🚪' },
    { name: 'MASTER BEDROOM 主卧', pages: 4, icon: '🛏️' },
    { name: 'GUEST ROOM 客卧', pages: 5, icon: '🛏️' },
    { name: 'OFFICE 办公室', pages: 3, icon: '💼' },
    { name: 'W.I.C 衣帽间', pages: 4, icon: '👔' }
  ]
};

for (const dept in nasData) {
  for (const designer in nasData[dept].designers) {
    const dObj = nasData[dept].designers[designer];
    for (const country in dObj.countries) {
      dObj.countries[country].forEach((caseName, idx) => {
        const styles = styleMap[designer] || ['现代简约'];
        const style = styles[idx % styles.length];
        const hasVR = !!vrPanoramaMap[caseName];
        nasCases.push({ name:caseName, dept, designer, designerId:dObj.id, country, style, theme:themeMap[style]||'modern', size:Math.floor(Math.random()*80+20), hasVR });      });
    }
  }
}

// 为 NAS 案例补充 id / number / reuseCount，并接入统一案例模块
nasCases.forEach(function (c, i) {
  c.id = 3000 + i;
  if (!c.number) {
    var enMap = { '美国':'America','新加坡':'Singapore','马来西亚':'Malaysia','欧美':'Europe','非洲':'Africa','日本':'Japan' };
    c.number = (c.designerId || '000') + '-' + (enMap[c.country] || c.country) + '-案例' + String(i + 1).padStart(3, '0');
  }
  if (c.reuseCount == null) c.reuseCount = Math.floor(Math.random() * 40 + 5);
  if (c.time == null) c.time = '2026-05-' + String((i % 28) + 1).padStart(2, '0');
});
if (window.GDCase) GDCase.setSource(function () { return nasCases; }, { afterReuse: function () { if (typeof filterCases === 'function') filterCases(); } });

// ========== INIT ==========
function buildDesignerDropdown() {
  const designers = new Set();
  nasCases.forEach(c => designers.add(JSON.stringify({name:c.designer,id:c.designerId})));
  const sel = document.getElementById('nasDesignerFilter');
  sel.innerHTML = '<option value="">全部设计师</option>' +
    [...designers].map(d => { const o = JSON.parse(d); return `<option value="${o.name}">${o.name} (ID:${o.id})</option>`; }).join('');
}

function onDeptChange() {
  const dept = document.getElementById('nasDeptFilter').value;
  const sel = document.getElementById('nasDesignerFilter');
  sel.innerHTML = '<option value="">全部设计师</option>';
  if (dept && nasData[dept]) {
    for (const d in nasData[dept].designers) {
      const id = nasData[dept].designers[d].id;
      sel.innerHTML += `<option value="${d}">${d} (ID:${id})</option>`;
    }
  } else {
    buildDesignerDropdown();
  }
  filterCases();
}

// ========== DIRECTORY TREE ==========
function toggleNASTree() {
  const header = document.getElementById('nasTreeHeader');
  const body = document.getElementById('nasTreeBody');
  header.classList.toggle('collapsed');
  body.classList.toggle('hidden');
}

function buildNASTree() {
  const tree = document.getElementById('nasTreeBody');
  let html = '';
  for (const dept in nasData) {
    html += `<div class="dir-item" onclick="toggleDir(this,'n-${dept}')"><span class="dir-toggle">▼</span>📁 ${dept}</div>`;
    html += `<div class="dir-children" id="children-n-${dept}" style="display:block;">`;
    for (const designer in nasData[dept].designers) {
      const dObj = nasData[dept].designers[designer];
      const dKey = `n-${dept}/${designer}`;
      html += `<div class="dir-item" onclick="toggleDir(this,'${dKey}')"><span class="dir-toggle">▶</span>👤 ${designer}（ID:${dObj.id}）</div>`;
      html += `<div class="dir-children" id="children-${dKey}" style="display:none;">`;
      for (const country in dObj.countries) {
        const cKey = `${dKey}/${country}`;
        html += `<div class="dir-item" onclick="toggleDir(this,'${cKey}')"><span class="dir-toggle">▶</span>🌍 ${country}</div>`;
        html += `<div class="dir-children" id="children-${cKey}" style="display:none;">`;
        dObj.countries[country].forEach(cn => {
          html += `<div class="dir-item" onclick="selectTreeCase('${dept}','${designer}','${country}','${cn}')">📋 ${cn}</div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  tree.innerHTML = html;
}

function toggleDir(el, key) {
  const children = document.getElementById('children-' + key);
  const toggle = el.querySelector('.dir-toggle');
  if (children) {
    const isOpen = children.style.display !== 'none';
    children.style.display = isOpen ? 'none' : 'block';
    if (toggle) toggle.textContent = isOpen ? '▶' : '▼';
  }
}

function selectTreeCase(dept, designer, country, caseName) {
  document.getElementById('nasDeptFilter').value = dept;
  onDeptChange();
  document.getElementById('nasDesignerFilter').value = designer;
  document.getElementById('nasCountryFilter').value = country;
  filterCases();
  document.querySelectorAll('#nasTreeBody .dir-item').forEach(i => i.classList.remove('active'));
}

// ========== PAGINATION ==========
let currentPage = 1;
const pageSize = 12;

function renderPagination(totalItems) {
  const totalPages = Math.ceil(totalItems / pageSize);
  const pagination = document.getElementById('nasPagination');
  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }

  let html = `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>◀◀</button>
              <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>`;

  // Show page numbers
  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  
  if (endPage - startPage + 1 < maxVisible) {
    startPage = Math.max(1, endPage - maxVisible + 1);
  }

  for (let i = startPage; i <= endPage; i++) {
    html += `<button onclick="goToPage(${i})" class="${currentPage === i ? 'active' : ''}">${i}</button>`;
  }

  html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>
           <button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>▶▶</button>
           <span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>`;

  pagination.innerHTML = html;
}

function goToPage(page) {
  const totalPages = Math.ceil(nasCases.length / pageSize);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  filterCases();
}

function getCurrentPageCases() {
  const dept = document.getElementById('nasDeptFilter').value;
  const designer = document.getElementById('nasDesignerFilter').value;
  const country = document.getElementById('nasCountryFilter').value;

  let filtered = nasCases.filter(c =>
    (!dept || c.dept === dept) &&
    (!designer || c.designer === designer) &&
    (!country || c.country === country)
  );

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  return { filtered, paginated: filtered.slice(start, end) };
}

// ========== CASE DETAIL ==========
function showCaseDetail(caseName, hasVR) {
  if (hasVR) {
    openVRPanorama(caseName);
  } else {
    openPPTProposal(caseName);
  }
}

function openVRPanorama(caseName) {
  const url = vrPanoramaMap[caseName] || 'https://img.gbuilderchina.com/panorama/direct-86c6862f-b698-4fd0-893c-355d0ba0e4a4/tour.html';
  document.getElementById('vrPanoramaTitle').textContent = `VR 全景 - ${caseName}`;
  document.getElementById('vrPanoramaFrame').src = url;
  openModal('vrPanoramaModal');
}

function closeVRPanorama() {
  document.getElementById('vrPanoramaFrame').src = '';
  closeModal('vrPanoramaModal');
}

function openPPTProposal(caseName) {
  document.getElementById('pptProposalTitle').textContent = `PPT 设计提案 - ${caseName}`;
  renderPPTProposal();
  openModal('pptProposalModal');
}

function renderPPTProposal() {
  const sidebar = document.getElementById('pptSidebar');
  let html = '';
  pptProposalData.chapters.forEach((chapter, idx) => {
    html += `<div class="ppt-chapter" onclick="selectPPTChapter(${idx})">
              <span>${chapter.icon}</span>
              <span>${chapter.name}</span>
            </div>`;
  });
  sidebar.innerHTML = html;
  selectPPTChapter(0);
}

let currentPPTChapter = 0;
let currentPPTSlide = 0;

function selectPPTChapter(idx) {
  currentPPTChapter = idx;
  currentPPTSlide = 0;
  document.querySelectorAll('.ppt-chapter').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  renderPPTSlide();
}

function renderPPTSlide() {
  const chapter = pptProposalData.chapters[currentPPTChapter];
  const canvas = document.getElementById('pptCanvas');
  canvas.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:20px;margin-bottom:10px;color:var(--text);">${chapter.name}</div>
      <div style="font-size:14px;color:var(--text-secondary);margin-bottom:20px;">第 ${currentPPTSlide + 1} / ${chapter.pages} 页</div>
      <div style="width:600px;height:400px;background:linear-gradient(135deg,#f0f0f0,#e0e0e0);border-radius:12px;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);">
        <div style="text-align:center;">
          <div style="font-size:48px;margin-bottom:16px;">${chapter.icon}</div>
          <div style="font-size:16px;color:var(--text);">${chapter.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">页面 ${currentPPTSlide + 1} / ${chapter.pages}</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('pptSlideInfo').textContent = `${chapter.name} - 第 ${currentPPTSlide + 1} / ${chapter.pages} 页`;
}

function pptPrevSlide() {
  const chapter = pptProposalData.chapters[currentPPTChapter];
  if (currentPPTSlide > 0) {
    currentPPTSlide--;
    renderPPTSlide();
  }
}

function pptNextSlide() {
  const chapter = pptProposalData.chapters[currentPPTChapter];
  if (currentPPTSlide < chapter.pages - 1) {
    currentPPTSlide++;
    renderPPTSlide();
  }
}

// ========== FILTER & RENDER ==========
function filterCases() {
  const { filtered, paginated } = getCurrentPageCases();
  
  document.getElementById('nasResultCount').textContent = `共 ${filtered.length} 个案例`;
  document.getElementById('nasCaseGrid').innerHTML = paginated.map(renderNASCaseCard).join('')
    || '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:60px;">暂无匹配案例</p>';
  
  renderPagination(filtered.length);
}

function resetNASFilter() {
  document.getElementById('nasDeptFilter').value = '';
  document.getElementById('nasDesignerFilter').value = '';
  document.getElementById('nasCountryFilter').value = '';
  currentPage = 1;
  buildDesignerDropdown();
  filterCases();
}

function getTagClass(s) {
  const m = {'现代简约':'tag-blue','北欧':'tag-green','新中式':'tag-purple','轻奢':'tag-orange','工业风':'tag-red','日式':'tag-pink','美式':'tag-cyan'};
  return m[s] || 'tag-blue';
}

function renderNASCaseCard(c) {
  return GDCase.renderCard(c, {
    context: 'nas',
    extraActions: function (cc) {
      return '<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); confirmNASDownload(\'' +
        cc.name + '\',\'' + cc.dept + '\',\'' + cc.designer + '\',\'' + cc.country + '\')">📥 下载到我的NAS</button>';
    }
  });
}

// ========== NAS DOWNLOAD FLOW ==========
let nasDownloadTarget = null;

function nasDownloadFromButton(btn) {
  confirmNASDownload(btn.dataset.name, btn.dataset.dept, btn.dataset.designer, btn.dataset.country);
}

function confirmNASDownload(name, dept, designer, country) {
  nasDownloadTarget = { name, dept, designer, country };
  document.getElementById('nasConfirmMsg').innerHTML =
    `确认将【<strong>${name}</strong>】复制到您的NAS？<br><br>
    目标路径：<code style="font-size:12px;">/个人/陈磊/${country}/${name}/</code><br>
    包含：产品资料 + 设计源文件 + 客户交付资料`;
  openModal('nasDownloadConfirmModal');
}

function startNASDownload() {
  closeModal('nasDownloadConfirmModal');
  if (!nasDownloadTarget) return;
  const t = nasDownloadTarget;

  openModal('nasDownloadModal');
  document.getElementById('nasDownloadBar').style.width = '0%';
  document.getElementById('nasDownloadPercent').textContent = '0%';
  document.getElementById('nasDownloadStatus').textContent = '正在创建副本目录...';
  ['ns1','ns2','ns3'].forEach(id => document.getElementById(id).className = 'reuse-step');

  // Stage 1: create dir
  setTimeout(() => {
    document.getElementById('ns1').classList.add('active');
    setTimeout(() => document.getElementById('ns1').classList.add('done'), 500);
    document.getElementById('nasDownloadBar').style.width = '33%';
    document.getElementById('nasDownloadPercent').textContent = '33%';
    document.getElementById('nasDownloadStatus').textContent = '正在拷贝产品资料...';
  }, 400);

  // Stage 2: copy files
  setTimeout(() => {
    document.getElementById('ns2').classList.add('active');
    setTimeout(() => document.getElementById('ns2').classList.add('done'), 600);
    document.getElementById('nasDownloadBar').style.width = '66%';
    document.getElementById('nasDownloadPercent').textContent = '66%';
    document.getElementById('nasDownloadStatus').textContent = '正在拷贝设计源文件 + 交付资料...';
  }, 1400);

  // Stage 3: complete
  setTimeout(() => {
    document.getElementById('ns3').classList.add('active');
    setTimeout(() => document.getElementById('ns3').classList.add('done'), 600);
    document.getElementById('nasDownloadBar').style.width = '100%';
    document.getElementById('nasDownloadPercent').textContent = '100%';
    document.getElementById('nasDownloadStatus').textContent = '复制完成！';
    setTimeout(() => {
      closeModal('nasDownloadModal');
      showToast('success', `已将【${t.name}】复制到您的NAS目录 /个人/陈磊/${t.country}/${t.name}/`);
      updateNASStats();
    }, 800);
  }, 2400);
}

function updateNASStats() {
  const newTotal = 156 + Math.floor(Math.random() * 10 + 5);
  const pct = (newTotal / 500 * 100).toFixed(1);
  document.getElementById('nasTotalUsed').textContent = newTotal;
  document.getElementById('nasTotalPct').textContent = pct + '%';
  document.getElementById('nasTotalBar').style.width = pct + '%';
}

// Init
buildNASTree();
buildDesignerDropdown();
filterCases();
</script>
