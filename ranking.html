<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计师榜单 - George Design</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <header class="header">
    <h1 class="header-title" id="headerTitle">设计师榜单</h1>
    <div class="header-actions">
      <button class="dark-toggle" onclick="toggleDarkMode()">🌙 暗色模式</button>
      <button class="btn btn-ghost" onclick="showShortcuts()">⌨ 快捷键</button>
    </div>
  </header>
  <div class="page-content">
    <div class="page active">
      <!-- 维度 + 周期 -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;">
        <div class="home-tabs" style="margin-bottom:0;border:none;">
          <div class="home-tab active" data-metric="reuse" onclick="setMetric('reuse')">复用榜</div>
          <div class="home-tab" data-metric="cases" onclick="setMetric('cases')">产量榜</div>
          <div class="home-tab" data-metric="points" onclick="setMetric('points')">积分榜</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <div class="range-presets">
            <button class="range-preset" data-preset="lastMonth" onclick="setPreset('lastMonth')">上月</button>
            <button class="range-preset active" data-preset="thisMonth" onclick="setPreset('thisMonth')">本月</button>
            <button class="range-preset" data-preset="last3" onclick="setPreset('last3')">近3月</button>
            <button class="range-preset" data-preset="thisYear" onclick="setPreset('thisYear')">今年</button>
          </div>
          <span style="font-size:12px;color:var(--text-muted);">自定义：</span>
          <input type="month" class="input" id="rangeStart" onchange="onCustomRange()" style="width:140px;">
          <span style="color:var(--text-muted);">→</span>
          <input type="month" class="input" id="rangeEnd" onchange="onCustomRange()" style="width:140px;">
        </div>
      </div>

      <!-- 前三名领奖台 -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-title" id="podiumTitle">本月复用榜 · 前三名</div>
        <div class="rank-podium" id="podium"></div>
      </div>

      <!-- 完整榜单 -->
      <div class="card">
        <div class="card-header"><span class="card-title">完整排行</span><span style="font-size:12px;color:var(--text-muted);" id="rankSub"></span></div>
        <div id="rankList"></div>
      </div>
    </div>
  </div>
</main>

<div class="history-panel" id="historyPanel"><div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><strong>操作历史</strong><button class="btn btn-ghost btn-sm" onclick="toggleHistory()">✕</button></div><div id="historyList"></div></div>
<div class="modal-overlay" id="shortcutsModal"><div class="modal" style="max-width:600px;"><div class="modal-header"><h2>快捷键参考</h2><button class="modal-close" onclick="closeModal('shortcutsModal')">✕</button></div><div class="modal-body"><table><thead><tr><th>快捷键</th><th>功能</th></tr></thead><tbody><tr><td><kbd>?</kbd></td><td>显示快捷键</td></tr><tr><td><kbd>Ctrl/Cmd + R</kbd></td><td>设计师榜单</td></tr><tr><td><kbd>Esc</kbd></td><td>关闭弹窗</td></tr></tbody></table></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="common.js"></script>
<script>
// 设计师数据（不同周期不同权重）
var DESIGNERS = [
  {name:'陈磊', dept:'设计一部', reuse:156, cases:24, points:2480},
  {name:'林悦', dept:'设计一部', reuse:132, cases:21, points:2120},
  {name:'王明远', dept:'设计二部', reuse:118, cases:19, points:1980},
  {name:'张薇', dept:'设计三部', reuse:104, cases:18, points:1760},
  {name:'李强', dept:'设计四部', reuse:89, cases:15, points:1520},
  {name:'赵工', dept:'设计五部', reuse:67, cases:12, points:1180},
  {name:'孙敏', dept:'设计五部', reuse:54, cases:11, points:980},
  {name:'周杰', dept:'设计二部', reuse:43, cases:9, points:820},
  {name:'吴亮', dept:'设计三部', reuse:31, cases:7, points:640},
  {name:'郑虹', dept:'设计四部', reuse:22, cases:5, points:480},
];
var METRIC = 'reuse';
var METRIC_LABEL = { reuse:'复用榜', cases:'产量榜', points:'积分榜' };
// 演示口径：DESIGNERS 的数值代表「单月基准」，区间值 = 基准 × 月份数 × 月度系数
// 现在固定为 2026-05（演示当前月）
var NOW_Y = 2026, NOW_M = 5;
// 每个设计师每个月的相对活跃系数（让不同月份有差异，可看出"上个月"等区别）
var MONTH_SEED = {}; // name -> {key: factor}
function monthFactor(name, y, m){
  var k = name + y + m;
  // 稳定伪随机 0.6~1.4
  var h=0; for(var i=0;i<k.length;i++){ h=(h*31 + k.charCodeAt(i))>>>0; }
  return 0.6 + (h % 800)/1000;
}

function setMetric(m){
  METRIC = m;
  document.querySelectorAll('[data-metric]').forEach(function(t){ t.classList.toggle('active', t.dataset.metric===m); });
  renderRanking();
}
window.setMetric = setMetric;

function ym(y,m){ return y + '-' + (m<10?'0':'') + m; }
function setPreset(p){
  document.querySelectorAll('.range-preset').forEach(function(b){ b.classList.toggle('active', b.dataset.preset===p); });
  var s, e;
  if(p==='lastMonth'){ var lm=NOW_M-1, ly=NOW_Y; if(lm<1){lm=12;ly--;} s=ym(ly,lm); e=ym(ly,lm); }
  else if(p==='thisMonth'){ s=ym(NOW_Y,NOW_M); e=ym(NOW_Y,NOW_M); }
  else if(p==='last3'){ var m3=NOW_M-2, y3=NOW_Y; while(m3<1){m3+=12;y3--;} s=ym(y3,m3); e=ym(NOW_Y,NOW_M); }
  else if(p==='thisYear'){ s=ym(NOW_Y,1); e=ym(NOW_Y,NOW_M); }
  document.getElementById('rangeStart').value=s;
  document.getElementById('rangeEnd').value=e;
  renderRanking();
}
window.setPreset = setPreset;
function onCustomRange(){
  document.querySelectorAll('.range-preset').forEach(function(b){ b.classList.remove('active'); });
  renderRanking();
}
window.onCustomRange = onCustomRange;

// 枚举区间内的所有月份 [{y,m}]
function monthsInRange(){
  var sv=document.getElementById('rangeStart').value, ev=document.getElementById('rangeEnd').value;
  if(!sv||!ev) return [{y:NOW_Y,m:NOW_M}];
  var sp=sv.split('-'), ep=ev.split('-');
  var sy=+sp[0], sm=+sp[1], ey=+ep[0], em=+ep[1];
  if(sy>ey || (sy===ey&&sm>em)){ var t=[sy,sm]; sy=ey; sm=em; ey=t[0]; em=t[1]; }
  var out=[], y=sy, m=sm, guard=0;
  while((y<ey || (y===ey&&m<=em)) && guard<240){ out.push({y:y,m:m}); m++; if(m>12){m=1;y++;} guard++; }
  return out.length?out:[{y:NOW_Y,m:NOW_M}];
}
function rangeLabel(){
  var sv=document.getElementById('rangeStart').value, ev=document.getElementById('rangeEnd').value;
  if(!sv||!ev) return '本月';
  if(sv===ev) return sv.replace('-','年')+'月';
  return sv.replace('-','年')+'月 ~ ' + ev.replace('-','年')+'月';
}

function renderRanking(){
  var months = monthsInRange();
  var rows = DESIGNERS.map(function(d){
    var v=0;
    months.forEach(function(mm){ v += d[METRIC] * monthFactor(d.name, mm.y, mm.m); });
    return { name:d.name, dept:d.dept, value: Math.round(v) };
  }).sort(function(a,b){ return b.value-a.value; });
  var max = rows[0].value || 1;
  var unit = METRIC==='points' ? ' 分' : (METRIC==='cases' ? ' 个' : ' 次');
  var lbl = rangeLabel();

  document.getElementById('podiumTitle').textContent = lbl + ' · ' + METRIC_LABEL[METRIC] + ' · 前三名';
  document.getElementById('rankSub').textContent = lbl + ' · 共 '+months.length+' 个月 · 按' + METRIC_LABEL[METRIC].replace('榜','') + '排序';

  var order = [1,0,2], cls=['silver','gold','bronze'];
  document.getElementById('podium').innerHTML = order.map(function(idx,i){
    var d = rows[idx]; if(!d) return '';
    return '<div class="rank-pod '+cls[i]+'"><div class="pod-avatar">'+d.name.charAt(0)+'</div>'+
      '<div style="font-weight:600;font-size:14px;">'+d.name+'</div>'+
      '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">'+d.value.toLocaleString()+unit+'</div>'+
      '<div class="pod-bar">'+(idx+1)+'</div></div>';
  }).join('');

  document.getElementById('rankList').innerHTML = rows.map(function(d,i){
    var me = d.name==='陈磊' ? 'style="background:var(--primary-light);border-radius:8px;"' : '';
    return '<div class="rank-row" '+me+'>'+
      '<div class="rank-num '+(i<3?'top':'')+'">'+(i+1)+'</div>'+
      '<div class="rank-av">'+d.name.charAt(0)+'</div>'+
      '<div style="width:120px;"><div style="font-weight:600;font-size:13px;">'+d.name+(d.name==='陈磊'?' （我）':'')+'</div>'+
        '<div style="font-size:11px;color:var(--text-muted);">'+d.dept+'</div></div>'+
      '<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+(d.value/max*100)+'%;"></div></div>'+
      '<div style="width:90px;text-align:right;font-weight:700;color:var(--primary);">'+d.value.toLocaleString()+'</div>'+
      '<div style="width:30px;text-align:right;font-size:12px;">'+unit+'</div>'+
    '</div>';
  }).join('');
}

setPreset('thisMonth');
</script>
</body>
</html>
